<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      overflow: hidden;
    }
    .version {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.7;
      margin-bottom: 16px;
    }
    .title {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 24px;
    }
    .summary {
      font-size: 20px;
      line-height: 1.5;
      opacity: 0.85;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div class="version">v{{VERSION}}</div>
  <div class="title">{{TITLE}}</div>
  <div class="summary">{{SUMMARY}}</div>
</body>
</html>
